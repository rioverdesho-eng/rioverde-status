<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rioverde スタッフ画面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Rioverde</h1>
  <p>スタッフ管理</p>
</header>

<div id="login">
  <h2>暗証番号</h2>
  <input type="password" id="pin" maxlength="6" placeholder="6桁">
  <button onclick="login()">ログイン</button>
</div>

<div id="staff" style="display:none;">

  <div class="seat">
    <h2>①番打席（高性能）</h2>
    <select id="course1">
      <option value="60">1時間</option>
      <option value="120">2時間</option>
    </select>
    <button onclick="startSeat(1)">利用開始</button>
    <button onclick="endSeat(1)">利用終了</button>
  </div>

  <!-- 2～6番も同じ形式 -->

</div>

<script src="app.js"></script>

</body>
</html>
