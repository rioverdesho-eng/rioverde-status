<div id="login">

<h2>暗証番号</h2>

<input
type="password"
id="pin"
maxlength="6"
placeholder="6桁の暗証番号">

<button onclick="login()">
ログイン
</button>

<div class="seat">
<h2>① 高性能打席</h2>
<p id="time1">残り時間：--</p>
<select id="course1">
<option value="60">1時間</option>
<option value="120">2時間</option>
</select>

<button class="start" onclick="startSeat(1)">

<button class="end" onclick="endSeat(1)">
